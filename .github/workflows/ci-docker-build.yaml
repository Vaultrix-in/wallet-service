name: Reusable Docker Build

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      failure_stage:
        value: ${{ jobs.build.outputs.failure_stage }}
      report_url:
        value: ${{ jobs.build.outputs.report_url }}
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      failure_stage: ${{ steps.failure.outputs.stage }}
      report_url: ${{ steps.report.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - id: report
        run: echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/wallet-service" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build
        run: |
          docker buildx build \
            --load \
            -t ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }} \
            .

      - name: Push image
        id: push
        run: |
          for i in 1 2 3; do
            docker push ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }} && break || sleep 5
          done

      - id: failure
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "stage=image_build_failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            echo "stage=image_push_failed" >> "$GITHUB_OUTPUT"
          else
            echo "stage=success" >> "$GITHUB_OUTPUT"
          fi
