name: Wallet Service CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]

concurrency:
  group: wallet-service-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  get-email:
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: author
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          EMAIL=$(git show -s --format='%ae' "$SHA" || echo "")
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"

  sonar-scan:
    uses: ./.github/workflows/ci-sonar-check.yaml
    secrets: inherit

  snyk-scan:
    needs: sonar-scan
    if: ${{ needs.sonar-scan.outputs.quality_gate_status == 'PASSED' }}
    uses: ./.github/workflows/ci-snyk-check.yaml
    secrets: inherit

  notify:
    needs: [sonar-scan, snyk-scan, get-email]
    if: >-
      ${{
        always() &&
        (
          needs.sonar-scan.outputs.quality_gate_status == 'FAILED' ||
          needs.snyk-scan.outputs.snyk_status == 'failure'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sonar Notification
        if: ${{ needs.sonar-scan.outputs.quality_gate_status == 'FAILED' }}
        uses: ./.github/actions/send-notification
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.sonar-scan.outputs.notify_summary }}
          author: ${{ github.event.pull_request.user.login }}
          gmail_username: ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          mail_to: ${{ needs.get-email.outputs.email || secrets.NOTIFY_EMAIL_TO || secrets.GMAIL_USERNAME }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ github.repository_owner }}_wallet-service

      - name: Snyk Notification
        if: ${{ needs.snyk-scan.outputs.snyk_status == 'failure' }}
        uses: ./.github/actions/send-notification
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.snyk-scan.outputs.notify_summary }}
          author: ${{ github.event.pull_request.user.login }}
          gmail_username: ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          mail_to: ${{ needs.get-email.outputs.email || secrets.NOTIFY_EMAIL_TO || secrets.GMAIL_USERNAME }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: https://app.snyk.io
