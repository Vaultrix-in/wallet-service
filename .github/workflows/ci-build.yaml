name: ci-build

on:
  pull_request:
    types: [closed]
    branches: [ "main" ]

concurrency:
  group: wallet-service-build-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  security-events: write
  packages: write

jobs:
  get-email:
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}
      name: ${{ steps.author.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: author
        run: |
          SHA="${{ github.sha }}"
          EMAIL=$(git show -s --format='%ae' "$SHA")
          NAME=$(git show -s --format='%an' "$SHA")
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

  gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - id: gate
        run: |
          export GH_TOKEN=${{ github.token }}
          SHOULD_BUILD=false
          if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q '"build"'; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews > reviews.json
          APPROVED=$(jq -r 'map(select(.state == "APPROVED")) | length > 0' reviews.json)
          if [ "$APPROVED" = "true" ]; then
            SHOULD_BUILD=true
          fi
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  docker-build:
    needs: gate
    if: ${{ needs.gate.outputs.should_build == 'true' }}
    permissions:
      contents: read
      actions: read
      security-events: write
      packages: write
    uses: ./.github/workflows/ci-docker-build.yaml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  update-helm-dev-values:
    needs: [gate, docker-build]
    if: ${{ needs.gate.outputs.should_build == 'true' && needs.docker-build.result == 'success' }}
    uses: ./.github/workflows/update-helm-dev.yaml
    with:
      helm_repo: Vaultrix-in/Vaultrix-Helm
      helm_branch: main
      values_file: apps/wallet-service/values-dev.yaml
      image_tag: ${{ needs.docker-build.outputs.image_tag }}
      yaml_path: .image.tag
      commit_message: "ci(wallet-service): update dev image tag to ${{ needs.docker-build.outputs.image_tag }}"
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  notify:
    name: Notify wallet-service image pipeline failure
    runs-on: ubuntu-latest
    needs: [gate, get-email, docker-build]
    if: ${{ always() && needs.gate.outputs.should_build == 'true' && needs.docker-build.result == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - name: Send wallet-service image pipeline notification
        uses: ./.github/actions/send-notification
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.docker-build.outputs.failure_stage }}
          author: ${{ needs.get-email.outputs.name || github.actor }}
          gmail_username: ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          mail_to: ${{ needs.get-email.outputs.email || secrets.NOTIFY_EMAIL_TO || secrets.GMAIL_USERNAME }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: ${{ needs.docker-build.outputs.report_url }}

